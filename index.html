<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./public/css/output.css" rel="stylesheet" />
    <title>komikme</title>
  </head>
  <body>
    <div class="main-container">
      <div class="jumbotron-style-position">
        <figure>
          <img
            src="public/img/Jumbotron_AOT.jpg"
            alt="Attack on titan"
            class="jumbotron-img-style"
          />
          <figcaption class="title-jumbotron">Attack On Titan</figcaption>
        </figure>
      </div>
      <div class="thumbnails">
        <button id="prevMenu" class="prev-button">
          <i data-feather="chevron-left"></i>
        </button>
        <div class=".container-thumbnails" id="dragContainer">
          <div class="inner-container-thumbnails">
            <figure class="thumbnail-style">
              <img
                src="public/img/Avatar_AOT.jpg"
                alt="Avatar attack on titan"
                class="thumbnail-img-style"
              />
            </figure>
            <figure class="thumbnail-style">
              <img
                src="public/img/Avatar_Naruto.jpg"
                alt="Avatar attack on titan"
                class="thumbnail-img-style"
              />
            </figure>
          </div>
        </div>
        <button id="nextMenu" class="next-button">
          <i data-feather="chevron-right"></i>
        </button>
      </div>
    </div>
  </body>
  <script src="src/script.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script>
    feather.replace();
  </script>
</html>
