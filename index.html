<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="public/css/output.css" rel="stylesheet" />
    <title>komikme</title>
  </head>
  <body>
    <main class="main-container">
      <section class="jumbotron-container" aria-label="Featured anime">
        <figure>
          <img
            src="./public/img/Jumbotron_AOT.jpg"
            alt="Attack on titan"
            class="jumbotron-img-style"
          />
        </figure>
        <figure>
          <img
            src="./public/img/Jumbotron_CM.jpg"
            alt="Chainsaw-Man"
            class="jumbotron-img-style"
          />
        </figure>
        <figure>
          <img
            src="./public/img/Jumbotron_Naruto.jpg"
            alt="Naruto"
            class="jumbotron-img-style"
          />
        </figure>
        <figure>
          <img
            src="./public/img/Jumbotron_Bresek.jpg"
            alt="Bresek"
            class="jumbotron-img-style"
          />
        </figure>
        <figure>
          <img
            src="./public/img/Jumbotron_JJK.jpg"
            alt="Jujutsu Kaisen"
            class="jumbotron-img-style"
          />
        </figure>
      </section>
      <section
        class="container-thumbnails"
        aria-label="Anime carousel thumbnails"
      >
        <div class="container-carousel" id="dragContainer">
          <div class="inner-container-carousel">
            <figure class="carousel-items">
              <img
                src="./public/img/Avatar_AOT.jpg"
                alt="Avatar attack on titan"
                class="img-carousel"
              />
              <figcaption class="name-item">
                <p>Attack On Titan</p>
              </figcaption>
            </figure>
            <figure class="carousel-items">
              <img
                src="./public/img/Avatar_CM.jpg"
                alt="Avatar Chainsaw-Man"
                class="img-carousel"
              />
              <figcaption class="name-item">
                <p>Chainsaw-Man</p>
              </figcaption>
            </figure>
            <figure class="carousel-items">
              <img
                src="./public/img/Avatar_Naruto.jpg"
                alt="Avatar Naruto"
                class="img-carousel"
              />
              <figcaption class="name-item"><p>Naruto</p></figcaption>
            </figure>
            <figure class="carousel-items">
              <img
                src="./public/img/Avatar_Bresek.jpg"
                alt="Avatar Bresek"
                class="img-carousel"
              />
              <figcaption class="name-item"><p>Bresek</p></figcaption>
            </figure>
            <figure class="carousel-items">
              <img
                src="./public/img/Avatar_JJK.jpg"
                alt="Avatar jujutsu kaisen"
                class="img-carousel"
              />
              <figcaption class="name-item"><p>Jujutsu Kaisen</p></figcaption>
            </figure>
          </div>
        </div>
        <nav class="container-pagination-dots" aria-label="Carousel pagination">
          <div id="pagination-dots"></div>
        </nav>
        <button id="prevMenu" class="prev-button" aria-label="Previous slide">
          <i data-feather="chevron-left"></i>
        </button>
        <button id="nextMenu" class="next-button" aria-label="next slide">
          <i data-feather="chevron-right"></i>
        </button>
      </section>
    </main>
    <script src="./src/script.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
      feather.replace();
    </script>
  </body>
</html>
